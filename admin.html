<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Keys</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f12;
      color: #e8f0f7;
      padding: 24px;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 20px;
    }

    .card {
      background: #12181d;
      border: 1px solid #24303a;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 18px;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    input, button {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #33424f;
      font-size: 14px;
    }

    input {
      background: #0e1418;
      color: #fff;
      min-width: 180px;
    }

    button {
      background: #19c37d;
      color: #08110d;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      filter: brightness(0.95);
    }

    .btn-secondary {
      background: #2a3640;
      color: #fff;
    }

    .btn-danger {
      background: #e5484d;
      color: #fff;
    }

    .btn-logout {
      background: #6b7280;
      color: #fff;
    }

    .msg {
      margin-top: 12px;
      min-height: 20px;
      color: #9dd6ff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #22303a;
      text-align: left;
      font-size: 14px;
      vertical-align: top;
      word-break: break-word;
    }

    th {
      color: #9fb3c8;
    }

    .tag {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    .tag-disponível { background: #1f3b2c; color: #7df0ad; }
    .tag-ativa { background: #1d3348; color: #86c7ff; }
    .tag-expirada { background: #4a3a19; color: #ffd76e; }
    .tag-revogada { background: #4b1f25; color: #ff9aa4; }

    .hidden {
      display: none;
    }

    @media (max-width: 900px) {
      table, thead, tbody, th, td, tr { display: block; }
      thead { display: none; }

      tr {
        margin-bottom: 14px;
        border: 1px solid #22303a;
        border-radius: 10px;
        padding: 10px;
      }

      td {
        border: none;
        padding: 6px 0;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <!-- LOGIN -->
    <div id="loginCard" class="card">
      <h1>Login Admin</h1>

      <div class="row">
        <div class="field">
          <label>Usuário</label>
          <input type="text" id="username">
        </div>

        <div class="field">
          <label>Senha</label>
          <input type="password" id="password">
        </div>

        <button onclick="login()">Entrar</button>
      </div>

      <div class="msg" id="loginMsg"></div>
    </div>

    <!-- PAINEL -->
    <div id="panelWrap" class="hidden">

      <h1>Painel de Keys</h1>

      <div class="card">
        <div class="row">
          <div class="field">
            <label>Dias</label>
            <input type="number" id="days" value="30">
          </div>

          <button onclick="gerarKey()">Gerar key</button>
          <button class="btn-secondary" onclick="listarKeys()">Atualizar</button>
          <button class="btn-logout" onclick="logout()">Sair</button>
        </div>

        <div class="msg" id="msg"></div>
      </div>

      <div class="card">
        <h3>Keys</h3>
        <div id="totalKeys"></div>
        <div id="keysTable"></div>
      </div>

    </div>
  </div>

<script>
  // 🔥 AQUI É A CORREÇÃO
  const API = "https://meu-servidor-5had.onrender.com";

  function getAuthHeaders() {
    return {
      "Content-Type": "application/json",
      "x-admin-user": localStorage.getItem("adminUser") || "",
      "x-admin-pass": localStorage.getItem("adminPass") || ""
    };
  }

  function showLogin() {
    loginCard.classList.remove("hidden");
    panelWrap.classList.add("hidden");
  }

  function showPanel() {
    loginCard.classList.add("hidden");
    panelWrap.classList.remove("hidden");
  }

  async function login() {
    const username = usernameInput.value.trim();
    const password = passwordInput.value.trim();

    if (!username || !password) {
      loginMsg.innerText = "Preencha tudo";
      return;
    }

    const res = await fetch(API + "/admin-login", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (data.success) {
      localStorage.setItem("adminUser", username);
      localStorage.setItem("adminPass", password);
      showPanel();
      listarKeys();
    } else {
      loginMsg.innerText = "Login inválido";
    }
  }

  function logout() {
    localStorage.clear();
    showLogin();
  }

  async function gerarKey() {
    msg.innerText = "Gerando...";

    const res = await fetch(API + "/generate-key", {
      method: "POST",
      headers: getAuthHeaders(),
      body: JSON.stringify({ days: Number(days.value) || 30 })
    });

    const data = await res.json();

    if (data.success) {
      msg.innerText = "Key: " + data.keyData.key;
      listarKeys();
    } else {
      msg.innerText = data.message;
    }
  }

  async function listarKeys() {
    const res = await fetch(API + "/keys", {
      headers: getAuthHeaders()
    });

    const data = await res.json();

    totalKeys.innerText = "Total: " + data.total;

    keysTable.innerHTML = data.keys.map(k => `
      <div style="margin-bottom:10px">
        ${k.key} | ${k.status}
      </div>
    `).join("");
  }

  const loginCard = document.getElementById("loginCard");
  const panelWrap = document.getElementById("panelWrap");
  const usernameInput = document.getElementById("username");
  const passwordInput = document.getElementById("password");
  const loginMsg = document.getElementById("loginMsg");
  const msg = document.getElementById("msg");
  const totalKeys = document.getElementById("totalKeys");
  const keysTable = document.getElementById("keysTable");
  const days = document.getElementById("days");

  function init() {
    if (localStorage.getItem("adminUser")) {
      showPanel();
      listarKeys();
    } else {
      showLogin();
    }
  }

  init();
</script>
</body>
</html>
